version: "3.9"

services:
  api:
    build: .
    container_name: transaction_api
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: transaction_worker
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info -Q transactions
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: transaction_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: transaction_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: